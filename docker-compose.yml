services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-emailpoc}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-emailpoc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The web app. On every start, its entrypoint (docker/entrypoint.sh) runs
  # `alembic upgrade head` against the "db" service above before launching
  # Uvicorn — the database schema is created/updated automatically, and
  # re-running it (container restart, `docker compose up` again, etc.) never
  # raises a duplicate-object error because Alembic tracks what has already
  # been applied.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-7000}:7000"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
